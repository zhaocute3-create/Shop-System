<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

.box {
  margin:20px;
}

.order {
  border:1px solid #00ffcc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:8px;
  margin-top:5px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:10px;
}
</style>

</head>

<body>

<h2>ADMIN PANEL 🔥 (LIVE)</h2>

<!-- 📦 ADD STOCK PANEL -->
<div class="box">
  <h3>Add Stock</h3>
  <input type="text" id="stockUser" placeholder="Username">
  <input type="text" id="stockPass" placeholder="Password">
  <button onclick="addStock()">Add Stock</button>
  <p id="stockCount">Stock: Loading...</p>
</div>

<!-- 🔍 SEARCH -->
<input type="text" id="search" placeholder="Search email..." oninput="searchOrders()">

<div id="orders" class="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  onAuthStateChanged, 
  setPersistence, 
  browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  onSnapshot, 
  doc, 
  updateDoc,
  addDoc,
  query,
  where,
  getDocs,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SAVE SESSION
await setPersistence(auth, browserLocalPersistence);

// ADMIN EMAIL
const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

// STORE
let allOrders = [];

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {

  if (user === null) return;

  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied!");
    window.location.replace("index.html");
    return;
  }

  loadStockCount();

  // REAL-TIME ORDERS
  onSnapshot(collection(db, "orders"), (snapshot) => {

    allOrders = [];

    snapshot.forEach(docSnap => {
      allOrders.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    displayOrders(allOrders);
  });

});

// 📦 ADD STOCK
window.addStock = async function(){
  let user = document.getElementById("stockUser").value;
  let pass = document.getElementById("stockPass").value;

  if(!user || !pass){
    alert("Fill all fields!");
    return;
  }

  await addDoc(collection(db, "accounts"), {
    username: user,
    password: pass,
    status: "available"
  });

  alert("✅ Stock Added!");

  document.getElementById("stockUser").value = "";
  document.getElementById("stockPass").value = "";

  loadStockCount();
};

// 📊 STOCK COUNT
async function loadStockCount(){
  const q = query(collection(db,"accounts"), where("status","==","available"));
  const snap = await getDocs(q);

  document.getElementById("stockCount").innerText = "Stock: " + snap.size;
}

// DISPLAY
function displayOrders(list){
  document.getElementById("orders").innerHTML = "";

  list.forEach(data => {
    document.getElementById("orders").innerHTML += `
      <div class="order">
        <p>
        UID: ${data.uid || "N/A"}<br>
        Email: ${data.email || "N/A"}<br>
        Item: ${data.item || "N/A"}<br>
        Price: ${data.price || "N/A"}<br>
        Ref: ${data.reference || "N/A"}<br>
        Status: ${data.status || "pending"}
        </p>

        ${data.proof ? `<img src="${data.proof}" width="100%">` : ""}

        ${data.status !== "approved" 
          ? `<button onclick="approve('${data.id}')">Approve</button>` 
          : `<p>✅ Approved</p>`}
      </div>
    `;
  });
}

// SEARCH
window.searchOrders = function(){
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = allOrders.filter(o => 
    (o.email || "").toLowerCase().includes(value)
  );

  displayOrders(filtered);
};

// 🔥 APPROVE WITH STOCK SYSTEM
window.approve = async function(orderId){

  const q = query(
    collection(db, "accounts"),
    where("status", "==", "available"),
    limit(1)
  );

  const snap = await getDocs(q);

  if(snap.empty){
    alert("❌ No stock available!");
    return;
  }

  const accDoc = snap.docs[0];
  const acc = accDoc.data();

  // mark as sold
  await updateDoc(doc(db, "accounts", accDoc.id), {
    status: "sold"
  });

  // send to order
  await updateDoc(doc(db, "orders", orderId), {
    status: "approved",
    account: `USER: ${acc.username}\nPASS: ${acc.password}`
  });

  alert("✅ Auto account sent!");

  loadStockCount();
};
</script>

</body>
</html>
