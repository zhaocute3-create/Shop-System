<!DOCTYPE html>
<html>
<head>
<title>ADMIN PRO</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;}
.box{margin:15px;}
input,select,button{
width:90%;padding:10px;margin:5px;border:none;border-radius:10px;
}
button{background:#22c55e;color:white;}
.card{background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
img{width:100%;border-radius:10px;margin-top:5px;}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL</h2>

<div class="box">
<select id="product">
<option>CODM</option>
<option>ML</option>
<option>Netflix</option>
</select>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<input type="file" id="img">

<button onclick="addStock()">ADD STOCK</button>
</div>

<h3>📦 STOCK</h3>
<div id="stock"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,addDoc,onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN="jhonlouiebaid92@gmail.com";

// 🔐 PROTECTION
onAuthStateChanged(auth,(u)=>{
if(!u || u.email!==ADMIN){
location="index.html";
}
});

// ✅ ADD STOCK WITH IMAGE
window.addStock=()=>{
let username=user.value;
let password=pass.value;
let product=document.getElementById("product").value;
let file=document.getElementById("img").files[0];

if(!username || !password || !file){
alert("Fill all + image!");
return;
}

let reader=new FileReader();

reader.onload=async(e)=>{
let image=e.target.result;

await addDoc(collection(db,"accounts"),{
username,
password,
product,
image,
status:"available"
});

alert("✅ Stock Added!");

user.value="";
pass.value="";
img.value="";
};

reader.readAsDataURL(file);
};

// 🔥 REALTIME STOCK VIEW
onSnapshot(collection(db,"accounts"),snap=>{
stock.innerHTML="";
snap.forEach(d=>{
let a=d.data();

stock.innerHTML+=`
<div class="card">
<h3>${a.product}</h3>
<p>${a.username}</p>
<p>Status: ${a.status}</p>
<img src="${a.image}">
</div>
`;
});
});
</script>

</body>
</html>
