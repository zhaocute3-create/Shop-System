<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

.box {
  margin:20px;
}

.order {
  border:1px solid #00ffcc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:8px;
  margin-top:5px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:10px;
}
</style>

</head>

<body>

<h2>ADMIN PANEL</h2>

<!-- 🔍 SEARCH BAR -->
<input type="text" id="search" placeholder="Search email..." oninput="searchOrders()">

<div id="orders" class="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ADMIN EMAIL
const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

// STORE ALL ORDERS
let allOrders = [];

// PROTECT ADMIN
onAuthStateChanged(auth, (user) => {
  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied!");
    window.location.href = "index.html";
  } else {
    loadOrders();
  }
});

// LOAD ORDERS
async function loadOrders(){
  const querySnapshot = await getDocs(collection(db, "orders"));

  allOrders = [];

  querySnapshot.forEach(docSnap => {
    allOrders.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  displayOrders(allOrders);
}

// DISPLAY ORDERS
function displayOrders(list){
  document.getElementById("orders").innerHTML = "";

  list.forEach(data => {
    document.getElementById("orders").innerHTML += `
      <div class="order">
        <p>
        UID: ${data.uid || "N/A"}<br>
        Email: ${data.email || "N/A"}<br>
        Item: ${data.item || "N/A"}<br>
        Price: ${data.price || "N/A"}<br>
        Ref: ${data.reference || "N/A"}<br>
        Status: ${data.status || "pending"}
        </p>

        ${data.proof ? `<img src="${data.proof}" width="100%">` : ""}

        ${data.status !== "approved" 
          ? `<button onclick="approve('${data.id}')">Approve</button>` 
          : `<p>✅ Approved</p>`}
      </div>
    `;
  });
}

// 🔍 SEARCH FUNCTION
window.searchOrders = function(){
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = allOrders.filter(o => 
    (o.email || "").toLowerCase().includes(value)
  );

  displayOrders(filtered);
};

// APPROVE ORDER
window.approve = async function(id){
  await updateDoc(doc(db, "orders", id), {
    status: "approved",
    account: "user123\npass123"
  });

  alert("Order Approved!");
  loadOrders();
};
</script>

</body>
</html>
