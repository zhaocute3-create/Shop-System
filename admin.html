<!DOCTYPE html>
<html>
<head>
<title>Admin Panel PRO</title>

<style>
body {
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

.box { margin:20px; }

.order, .stock {
  border:1px solid #00ffcc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:8px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.delete { background:red; }
.edit { background:orange; }
.logout { background:red; }

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:5px;
}

img{
  width:100%;
  border-radius:10px;
  margin-bottom:5px;
}
</style>

</head>

<body>

<h2>🔥 ADMIN PANEL PRO</h2>

<button class="logout" onclick="logout()">Logout</button>

<div class="box">
  <h3>💰 Earnings</h3>
  <p id="earnings">Loading...</p>
</div>

<div class="box">
  <h3>📊 Orders</h3>
  <p>Pending: <span id="pendingCount">0</span></p>
  <p>Approved: <span id="approvedCount">0</span></p>
</div>

<div class="box">
  <select onchange="filterStatus(this.value)">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved</option>
  </select>
</div>

<!-- 🔥 ADD STOCK WITH IMAGE -->
<div class="box">
  <h3>Add Stock</h3>

  <select id="product">
    <option value="CODM">CODM</option>
    <option value="ML">ML</option>
    <option value="Netflix">Netflix</option>
  </select>

  <input id="stockUser" placeholder="Username">
  <input id="stockPass" placeholder="Password">
  <input type="file" id="stockImage">

  <button onclick="addStock()">Add Stock</button>
  <p id="stockCount">Stock: Loading...</p>
</div>

<div class="box">
  <h3>📦 Stock List</h3>
  <div id="stockList"></div>
</div>

<input type="text" id="search" placeholder="Search email..." oninput="searchOrders()">

<div id="orders" class="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  addDoc,
  deleteDoc,
  query,
  where,
  getDocs,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

await setPersistence(auth, browserLocalPersistence);

const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

let allOrders = [];
let currentFilter = "";

// 🔐 AUTH
onAuthStateChanged(auth, (user) => {
  if (user === null) return;

  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied!");
    window.location.replace("index.html");
    return;
  }

  loadStock();
  loadStockCount();
  loadOrders();
});

// 🔥 ORDERS
function loadOrders(){
  onSnapshot(collection(db, "orders"), (snap) => {

    allOrders = [];
    let total = 0, pending = 0, approved = 0;

    snap.forEach(d => {
      let data = d.data();
      allOrders.push({ id: d.id, ...data });

      if (data.status === "approved"){
        total += Number(data.price || 0);
        approved++;
      } else pending++;
    });

    earnings.innerText = "₱ " + total;
    pendingCount.innerText = pending;
    approvedCount.innerText = approved;

    applyFilter();
  });
}

function applyFilter(){
  let list = allOrders;

  if(currentFilter){
    list = list.filter(o => o.status === currentFilter);
  }

  displayOrders(list);
}

window.filterStatus = function(status){
  currentFilter = status === "all" ? "" : status;
  applyFilter();
};

window.searchOrders = function(){
  let val = search.value.toLowerCase();
  displayOrders(allOrders.filter(o => (o.email||"").toLowerCase().includes(val)));
};

// DISPLAY ORDERS
function displayOrders(list){
  orders.innerHTML = "";

  list.forEach(o=>{
    orders.innerHTML+=`
    <div class="order">
      ${o.email}<br>
      ${o.item || "Account"} - ₱${o.price || 0}<br>
      Status: ${o.status}
      ${o.status!=="approved"
        ? `<br><button onclick="approve('${o.id}','${o.item || "CODM"}')">Approve</button>`
        : `<br>✅ Sent`}
    </div>`;
  });
}

// ✅ APPROVE AUTO STOCK
window.approve = async function(orderId,product){

  const q=query(
    collection(db,"accounts"),
    where("status","==","available"),
    where("product","==",product),
    limit(1)
  );

  const snap=await getDocs(q);

  if(snap.empty) return alert("No stock!");

  let accDoc=snap.docs[0];
  let acc=accDoc.data();

  await updateDoc(doc(db,"accounts",accDoc.id),{
    status:"sold"
  });

  await updateDoc(doc(db,"orders",orderId),{
    status:"approved",
    account:`USER: ${acc.username}\nPASS: ${acc.password}`
  });

  alert("Delivered!");
};

// 🔥 ADD STOCK WITH IMAGE
window.addStock = async function(){

  let user = stockUser.value;
  let pass = stockPass.value;
  let product = product.value;
  let file = stockImage.files[0];

  if(!user || !pass || !file){
    return alert("Complete all + image!");
  }

  try{

    const storageRef = ref(storage, "accounts/" + Date.now());
    await uploadBytes(storageRef, file);

    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db,"accounts"),{
      username:user,
      password:pass,
      product:product,
      image:url,
      status:"available"
    });

    stockUser.value="";
    stockPass.value="";
    stockImage.value="";

    alert("Stock added!");

  }catch(e){
    alert("Upload error");
  }
};

// 📦 STOCK LIST
function loadStock(){
  onSnapshot(collection(db,"accounts"), snap=>{
    let html="";
    snap.forEach(d=>{
      let s=d.data();

      html+=`
      <div class="stock">
        ${s.image?`<img src="${s.image}">`:""}
        ${s.product} | ${s.username}
        <br>Status: ${s.status}
        <br>
        <button class="edit" onclick="editStock('${d.id}')">Edit</button>
        <button class="delete" onclick="deleteStock('${d.id}')">Delete</button>
      </div>`;
    });

    stockList.innerHTML=html;
  });
}

// DELETE
window.deleteStock = async id=>{
  await deleteDoc(doc(db,"accounts",id));
};

// EDIT
window.editStock = async id=>{
  let u=prompt("New Username");
  let p=prompt("New Password");
  if(!u||!p)return;

  await updateDoc(doc(db,"accounts",id),{
    username:u,password:p
  });
};

// COUNT
async function loadStockCount(){
  const q=query(collection(db,"accounts"),where("status","==","available"));
  const snap=await getDocs(q);
  stockCount.innerText="Stock: "+snap.size;
}

// LOGOUT
window.logout = ()=>{
  signOut(auth).then(()=>location.replace("index.html"));
};
</script>

</body>
</html>
