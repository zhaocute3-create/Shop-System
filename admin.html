<!DOCTYPE html>
<html>
<head>
<title>ADMIN PRO</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;}
.box{background:#1e293b;padding:15px;margin:15px;border-radius:15px;}
input,select,button{width:90%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:#22c55e;color:white;}
.order,.stock{background:#0f172a;padding:10px;margin:10px;border-radius:10px;}
img{width:100%;border-radius:10px;}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL PRO</h2>

<div class="box">
<h3>Add Stock</h3>

<select id="product">
<option>CODM</option>
<option>ML</option>
<option>Netflix</option>
</select>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<input type="file" id="img">

<button onclick="addStock()">ADD STOCK</button>
</div>

<div class="box">
<h3>📦 STOCK</h3>
<div id="stockList"></div>
</div>

<div class="box">
<h3>📥 ORDERS</h3>
<div id="orders"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,query,where,getDocs,limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getStorage,ref,uploadBytes,getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

// 🔐 AUTH FIX
onAuthStateChanged(auth,(user)=>{
if(user===null)return;
if(!user) location="index.html";
});

// ADD STOCK WITH IMAGE
window.addStock=async()=>{
let file=img.files[0];
if(!user.value||!pass.value||!file) return alert("Fill all!");

let sRef=ref(storage,"stocks/"+Date.now());
await uploadBytes(sRef,file);
let url=await getDownloadURL(sRef);

await addDoc(collection(db,"accounts"),{
username:user.value,
password:pass.value,
product:product.value,
image:url,
status:"available"
});

alert("Stock Added!");
};

// SHOW STOCK
onSnapshot(collection(db,"accounts"),snap=>{
stockList.innerHTML="";
snap.forEach(d=>{
let s=d.data();

stockList.innerHTML+=`
<div class="stock">
<img src="${s.image}">
${s.product}<br>
${s.username}<br>
Status: ${s.status}
</div>`;
});
});

// SHOW ORDERS + AUTO SEND
onSnapshot(collection(db,"orders"),snap=>{
orders.innerHTML="";

snap.forEach(async d=>{
let o=d.data();

orders.innerHTML+=`
<div class="order">
${o.email}<br>
${o.product}<br>
Status: ${o.status}<br>
${o.proof?`<img src="${o.proof}">`:''}
${o.status==="pending"
? `<button onclick="approve('${d.id}','${o.product}')">APPROVE</button>`
: "✅ Done"}
</div>`;
});
});

// AUTO SEND SYSTEM
window.approve=async(id,product)=>{

const q=query(
collection(db,"accounts"),
where("status","==","available"),
where("product","==",product),
limit(1)
);

const snap=await getDocs(q);
if(snap.empty) return alert("No stock!");

let accDoc=snap.docs[0];
let acc=accDoc.data();

await updateDoc(doc(db,"accounts",accDoc.id),{
status:"sold"
});

await updateDoc(doc(db,"orders",id),{
status:"approved",
account:`USER: ${acc.username}\nPASS: ${acc.password}`
});

alert("Account Sent!");
};
</script>

</body>
</html>
