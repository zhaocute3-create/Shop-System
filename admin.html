<!DOCTYPE html>
<html>
<head>
<title>ADMIN</title>
<style>
body{background:#020617;color:white;font-family:sans-serif}
button{
  background:#00ff88;border:none;padding:10px;margin:5px;
  box-shadow:0 0 10px #00ff88;border-radius:10px;color:black
}
.card{
  border:1px solid #00ff88;padding:10px;margin:10px;
  border-radius:10px;box-shadow:0 0 10px #00ff88
}
input{
  margin:5px;padding:8px;border-radius:8px;border:none
}
</style>
</head>
<body>

<h2>🔥 ADMIN PANEL</h2>

<input id="product" placeholder="Product"><br>
<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>
<input type="file" id="img"><br>

<button onclick="addStock()">ADD STOCK</button>
<button onclick="logout()">LOGOUT</button>

<h3>📦 STOCK</h3>
<div id="stock"></div>

<h3>📥 ORDERS</h3>
<input id="search" placeholder="search email" oninput="renderOrders()">
<div id="orders"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection, addDoc, onSnapshot,
doc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN="jhonlouiebaid92@gmail.com";
let allOrders=[];

// 🔐 SECURITY
onAuthStateChanged(auth,u=>{
 if(!u || u.email!==ADMIN) location="index.html";
});

// ➕ ADD STOCK
window.addStock=()=>{
 let file=document.getElementById("img").files[0];

 if(!file) return alert("Select image");

 let reader=new FileReader();

 reader.onload=async(e)=>{
  await addDoc(collection(db,"accounts"),{
   product:product.value,
   username:user.value,
   password:pass.value,
   image:e.target.result,
   status:"available"
  });

  alert("✅ Added!");
 };

 reader.readAsDataURL(file);
};

// 📦 STOCK VIEW
onSnapshot(collection(db,"accounts"),snap=>{
 let html="";
 snap.forEach(docu=>{
  let s=docu.data();

  if(s.status==="available"){
   html+=`<div class="card">
   <b>${s.product}</b><br>
   ${s.username}<br>
   ID: ${docu.id}
   </div>`;
  }
 });
 stock.innerHTML=html;
});

// 📥 ORDERS
onSnapshot(collection(db,"orders"),snap=>{
 allOrders=[];
 snap.forEach(d=>{
  allOrders.push({id:d.id,...d.data()});
 });
 renderOrders();
});

// 🔍 SEARCH + RENDER
window.renderOrders=()=>{
 let html="";
 let q=search.value.toLowerCase();

 allOrders.forEach(o=>{
  if((o.user || "").toLowerCase().includes(q)){
   html+=`<div class="card">
   <b>${o.user}</b><br>
   Product: ${o.product}<br>
   Status: ${o.status}<br>

   ${o.status==="pending" ? `
   <button onclick="approve('${o.id}','${o.accountId}')">
   Approve
   </button>
   ` : "✔ Done"}
   </div>`;
  }
 });

 orders.innerHTML=html;
};

// ✅ APPROVE + AUTO SEND
window.approve = async (orderId, accId) => {

  let accSnap = await getDoc(doc(db, "accounts", accId));
  let acc = accSnap.data();

  // mark sold
  await updateDoc(doc(db, "accounts", accId), {
    status: "sold"
  });

  // send credentials
  await updateDoc(doc(db, "orders", orderId), {
    status: "approved",
    username: acc.username,
    password: acc.password
  });

  // earnings
  await addDoc(collection(db,"earnings"),{
    amount:100,
    date:Date.now()
  });

  alert("🔥 Approved + Sent");
};

// 🚪 LOGOUT
window.logout=()=>{
 signOut(auth).then(()=>location="index.html");
};
</script>

</body>
</html>
