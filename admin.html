<!DOCTYPE html>
<html>
<head>
<title>Admin Panel PRO</title>

<style>
body {
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

.box { margin:20px; }

.order, .stock {
  border:1px solid #00ffcc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:8px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.delete { background:red; }
.edit { background:orange; }
.logout { background:red; }

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:5px;
}

img{
  width:100%;
  border-radius:10px;
  margin-bottom:5px;
}
</style>

</head>

<body>

<h2>🔥 ADMIN PANEL PRO</h2>

<button class="logout" onclick="logout()">Logout</button>

<div class="box">
  <h3>💰 Earnings</h3>
  <p id="earnings">Loading...</p>
</div>

<div class="box">
  <h3>📊 Orders</h3>
  <p>Pending: <span id="pendingCount">0</span></p>
  <p>Approved: <span id="approvedCount">0</span></p>
</div>

<!-- ADD STOCK -->
<div class="box">
  <h3>Add Stock</h3>

  <select id="product">
    <option value="CODM">CODM</option>
    <option value="ML">ML</option>
    <option value="Netflix">Netflix</option>
  </select>

  <input id="stockUser" placeholder="Username">
  <input id="stockPass" placeholder="Password">
  <input type="file" id="stockImage">

  <button onclick="addStock()">Add Stock</button>
</div>

<div class="box">
  <h3>📦 Stock List</h3>
  <div id="stockList"></div>
</div>

<div id="orders" class="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  addDoc,
  deleteDoc,
  query,
  where,
  getDocs,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

await setPersistence(auth, browserLocalPersistence);

const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (user === null) return;

  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied!");
    location.replace("index.html");
    return;
  }

  loadStock();
  loadOrders();
});

// ADD STOCK (FIXED)
window.addStock = async function(){

  const user = document.getElementById("stockUser").value;
  const pass = document.getElementById("stockPass").value;
  const product = document.getElementById("product").value;
  const file = document.getElementById("stockImage").files[0];

  if(!user || !pass || !file){
    return alert("Complete all fields!");
  }

  try{
    const storageRef = ref(storage, "accounts/" + Date.now());
    await uploadBytes(storageRef, file);

    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db,"accounts"),{
      username: user,
      password: pass,
      product: product,
      image: url,
      status: "available"
    });

    document.getElementById("stockUser").value="";
    document.getElementById("stockPass").value="";
    document.getElementById("stockImage").value="";

    alert("✅ Stock Added!");

  }catch(e){
    console.error(e);
    alert("Upload error!");
  }
};

// LOAD STOCK
function loadStock(){
  onSnapshot(collection(db,"accounts"), snap=>{
    let html="";
    snap.forEach(d=>{
      let s=d.data();

      html+=`
      <div class="stock">
        ${s.image?`<img src="${s.image}">`:""}
        ${s.product} | ${s.username}
        <br>Status: ${s.status}
        <br>
        <button onclick="deleteStock('${d.id}')">Delete</button>
      </div>`;
    });

    stockList.innerHTML=html;
  });
}

// DELETE
window.deleteStock = async id=>{
  await deleteDoc(doc(db,"accounts",id));
};

// LOAD ORDERS
function loadOrders(){
  onSnapshot(collection(db,"orders"), snap=>{
    let html="";
    let pending=0, approved=0, total=0;

    snap.forEach(d=>{
      let o=d.data();

      if(o.status==="approved"){
        approved++;
        total+=Number(o.price||0);
      }else pending++;

      html+=`
      <div class="order">
        ${o.email}<br>
        Status: ${o.status}
      </div>`;
    });

    document.getElementById("orders").innerHTML=html;
    document.getElementById("pendingCount").innerText=pending;
    document.getElementById("approvedCount").innerText=approved;
    document.getElementById("earnings").innerText="₱ "+total;
  });
}

// LOGOUT
window.logout = ()=>{
  signOut(auth).then(()=>location.replace("index.html"));
};
</script>

</body>
</html>
