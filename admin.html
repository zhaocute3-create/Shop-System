<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;font-family:sans-serif">

<h2>ADMIN</h2>

<h3>💰 Earnings: ₱<span id="earnings">0</span></h3>

<h3>👥 Online Users</h3>
<div id="users"></div>

<input id="product" placeholder="Product"><br>
<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>
<input id="price" placeholder="Price"><br>

<button onclick="addStock()">ADD</button>

<h3>STOCK</h3>
<div id="stock"></div>

<h3>ORDERS</h3>
<div id="orders"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,addDoc,onSnapshot,
doc,updateDoc,getDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN="jhonlouiebaid92@gmail.com";

// SECURITY
onAuthStateChanged(auth,user=>{
 if(!user || user.email!==ADMIN){
  location="index.html";
 }
});

// ADD STOCK
window.addStock=async()=>{
 await addDoc(collection(db,"accounts"),{
  product:product.value,
  username:user.value,
  password:pass.value,
  price:price.value,
  status:"available"
 });
};

// STOCK
onSnapshot(collection(db,"accounts"),snap=>{
 let html="";
 snap.forEach(d=>{
  let s=d.data();
  html+=`
  <div>
  ${s.product} ₱${s.price}
  <button onclick="del('${d.id}')">Delete</button>
  </div>`;
 });
 stock.innerHTML=html;
});

// DELETE
window.del=async(id)=>{
 await deleteDoc(doc(db,"accounts",id));
};

// ORDERS
onSnapshot(collection(db,"orders"),snap=>{
 let html="";
 let total=0;

 snap.forEach(d=>{
  let o=d.data();

  if(o.status==="approved"){
   total+=Number(o.price||0);
  }

  html+=`
  <div>
  ${o.user}<br>${o.product}<br>${o.status}
  <button onclick="approve('${d.id}','${o.accountId}')">Approve</button>
  <button onclick="reject('${d.id}')">Reject</button>
  </div><hr>`;
 });

 earnings.innerText=total;
 orders.innerHTML=html;
});

// APPROVE
window.approve=async(id,accId)=>{
 let acc=await getDoc(doc(db,"accounts",accId));
 let data=acc.data();

 await updateDoc(doc(db,"orders",id),{
  status:"approved",
  username:data.username,
  password:data.password
 });

 await updateDoc(doc(db,"accounts",accId),{
  status:"sold"
 });
};

// REJECT
window.reject=async(id)=>{
 await deleteDoc(doc(db,"orders",id));
};

// ONLINE USERS
onSnapshot(collection(db,"presence"),snap=>{
 let html="";
 snap.forEach(d=>{
  html+=`<div>${d.data().email}</div>`;
 });
 users.innerHTML=html;
});
</script>

</body>
</html>
