async function loadOrders(){
  const querySnapshot = await getDocs(collection(db, "orders"));

  querySnapshot.forEach(doc => {
    let data = doc.data();

    document.getElementById("orders").innerHTML += `
      <p>
      UID: ${data.uid}<br>
      Email: ${data.email}<br>
      Item: ${data.item}<br>
      Price: ${data.price}<br>
      Status: ${data.status}
      </p><hr>
    `;
  });
}
