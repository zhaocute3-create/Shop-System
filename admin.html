<!DOCTYPE html>
<html>
<head>
<style>
body{background:#020617;color:white;font-family:sans-serif}
.card{border:1px solid #00ff88;margin:10px;padding:10px}
button{background:#00ff88;border:none;padding:10px;margin:5px}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL</h2>

<input id="product" placeholder="Product"><br>
<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>
<input id="price" placeholder="Price"><br>

<input type="file" id="img1"><br>
<input type="file" id="img2"><br>
<input type="file" id="img3"><br>

<button onclick="addStock()">ADD STOCK</button>

<h3>📥 ORDERS</h3>
<div id="orders"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,addDoc,onSnapshot,
doc,updateDoc,getDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth,user=>{
 if(!user || user.email!=="jhonlouiebaid92@gmail.com"){
  location="index.html";
 }
});

// ADD STOCK
window.addStock=async()=>{
 let getBase64=file=>new Promise(res=>{
  let r=new FileReader();
  r.onload=e=>res(e.target.result);
  r.readAsDataURL(file);
 });

 let img1=document.getElementById("img1").files[0];
 let img2=document.getElementById("img2").files[0];
 let img3=document.getElementById("img3").files[0];

 await addDoc(collection(db,"accounts"),{
  product:product.value,
  username:user.value,
  password:pass.value,
  price:price.value,
  image1:img1?await getBase64(img1):"",
  image2:img2?await getBase64(img2):"",
  image3:img3?await getBase64(img3):"",
  status:"available"
 });

 alert("Stock Added 🔥");
};

// ORDERS
onSnapshot(collection(db,"orders"),snap=>{
 let html="";
 snap.forEach(d=>{
  let o=d.data();

  html+=`
  <div class="card">
  ${o.email}<br>
  ${o.product}<br>
  ${o.status}<br>

  ${o.receipt?`<img src="${o.receipt}" width="100%">`:""}

  <button onclick="approve('${d.id}','${o.accId}')">Approve</button>
  <button onclick="disapprove('${d.id}')">Disapprove</button>
  </div>`;
 });

 orders.innerHTML=html;
});

// APPROVE
window.approve=async(id,accId)=>{
 let acc=await getDoc(doc(db,"accounts",accId));
 let data=acc.data();

 await updateDoc(doc(db,"accounts",accId),{status:"sold"});

 await updateDoc(doc(db,"orders",id),{
  status:"approved",
  username:data.username,
  password:data.password
 });

 alert("Approved 🔥");
};

// DISAPPROVE
window.disapprove=async(id)=>{
 await deleteDoc(doc(db,"orders",id));
 alert("Disapproved ❌");
};
</script>

</body>
</html>
