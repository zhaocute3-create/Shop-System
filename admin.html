<!DOCTYPE html>
<html>
<head>
<title>Admin Panel PRO</title>

<style>
body {
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}

.box { margin:20px; }

.order, .stock {
  border:1px solid #00ffcc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:8px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.delete { background:red; }
.edit { background:orange; }

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
  margin:5px;
}

img {
  border-radius:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<h2>🔥 ADMIN PANEL PRO</h2>

<!-- 💰 EARNINGS -->
<div class="box">
  <h3>💰 Earnings</h3>
  <p id="earnings">Loading...</p>
</div>

<!-- 📦 ADD STOCK -->
<div class="box">
  <h3>Add Stock (With Image)</h3>

  <select id="product">
    <option value="CODM">CODM</option>
    <option value="ML">ML</option>
    <option value="Netflix">Netflix</option>
  </select>

  <input id="stockUser" placeholder="Username">
  <input id="stockPass" placeholder="Password">
  <input type="file" id="stockImg">

  <button onclick="addStock()">Add Stock</button>
  <p id="stockCount">Stock: Loading...</p>
</div>

<!-- 📦 STOCK LIST -->
<div class="box">
  <h3>📦 Stock List</h3>
  <div id="stockList"></div>
</div>

<!-- 🔍 SEARCH -->
<input type="text" id="search" placeholder="Search email..." oninput="searchOrders()">

<div id="orders" class="box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  addDoc,
  deleteDoc,
  query,
  where,
  getDocs,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "...",
  projectId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

await setPersistence(auth, browserLocalPersistence);

const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

let allOrders = [];

// AUTH
onAuthStateChanged(auth, (user) => {
  if (user === null) return;

  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied!");
    window.location.replace("index.html");
    return;
  }

  loadStock();
  loadStockCount();

  // ORDERS LIVE
  onSnapshot(collection(db, "orders"), (snap) => {
    allOrders = [];

    let total = 0;

    snap.forEach(d => {
      let data = d.data();
      allOrders.push({ id: d.id, ...data });

      if (data.status === "approved") {
        total += Number(data.price || 0);
      }
    });

    document.getElementById("earnings").innerText = "₱ " + total;

    displayOrders(allOrders);
  });
});

// 🔥 ADD STOCK WITH IMAGE
window.addStock = async function(){
  let user = stockUser.value;
  let pass = stockPass.value;
  let product = document.getElementById("product").value;
  let file = document.getElementById("stockImg").files[0];

  if(!user || !pass || !file) return alert("Fill all!");

  const imgRef = ref(storage, "accounts/" + Date.now());
  await uploadBytes(imgRef, file);
  const imgURL = await getDownloadURL(imgRef);

  await addDoc(collection(db, "accounts"), {
    username:user,
    password:pass,
    product:product,
    image:imgURL,
    status:"available"
  });

  stockUser.value="";
  stockPass.value="";
  stockImg.value="";

  loadStockCount();
};

// LOAD STOCK LIST (WITH IMAGE)
function loadStock(){
  onSnapshot(collection(db,"accounts"), snap=>{
    let html="";
    snap.forEach(d=>{
      let s=d.data();

      html+=`
      <div class="stock">
        <img src="${s.image || ''}" width="100%">
        <p>${s.product}</p>
        <p>${s.username}</p>
        <p>Status: ${s.status}</p>

        <button class="edit" onclick="editStock('${d.id}')">Edit</button>
        <button class="delete" onclick="deleteStock('${d.id}')">Delete</button>
      </div>`;
    });

    stockList.innerHTML=html;
  });
}

// DELETE
window.deleteStock = async function(id){
  await deleteDoc(doc(db,"accounts",id));
};

// EDIT
window.editStock = async function(id){
  let newUser = prompt("New Username:");
  let newPass = prompt("New Password:");

  if(!newUser || !newPass) return;

  await updateDoc(doc(db,"accounts",id),{
    username:newUser,
    password:newPass
  });

  alert("Updated!");
};

// STOCK COUNT
async function loadStockCount(){
  const q=query(collection(db,"accounts"),where("status","==","available"));
  const snap=await getDocs(q);

  stockCount.innerText="Stock: "+snap.size;
}

// SEARCH
window.searchOrders=function(){
  let val=search.value.toLowerCase();
  displayOrders(allOrders.filter(o=>o.email.toLowerCase().includes(val)));
};

// DISPLAY ORDERS
function displayOrders(list){
  orders.innerHTML="";

  list.forEach(o=>{
    orders.innerHTML+=`
    <div class="order">
      ${o.email}<br>
      ${o.item} - ₱${o.price}<br>
      Status: ${o.status}
      ${o.proof?`<br><img src="${o.proof}" width="100%">`:''}
      ${o.status!=="approved"
        ? `<br><button onclick="approve('${o.id}','${o.item}')">Approve</button>`
        : `<br>✅ Sent`}
    </div>`;
  });
}

// APPROVE
window.approve=async function(orderId,product){

  const q=query(
    collection(db,"accounts"),
    where("status","==","available"),
    where("product","==",product),
    limit(1)
  );

  const snap=await getDocs(q);

  if(snap.empty) return alert("No stock!");

  let accDoc=snap.docs[0];
  let acc=accDoc.data();

  await updateDoc(doc(db,"accounts",accDoc.id),{
    status:"sold"
  });

  await updateDoc(doc(db,"orders",orderId),{
    status:"approved",
    account:`USER: ${acc.username}\nPASS: ${acc.password}`
  });

  alert("Auto sent!");
};
</script>

</body>
</html>
