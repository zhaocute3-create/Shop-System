<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{background:black;color:#00ffcc;text-align:center;font-family:monospace;}
input,select,button{width:80%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:#22c55e;color:white;}
.card{border:1px solid #00ffcc;margin:10px;padding:10px;}
</style>
</head>
<body>

<h2>🔥 ADMIN PANEL</h2>

<select id="product">
<option>CODM</option>
<option>ML</option>
<option>Netflix</option>
</select>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<input type="file" id="img">

<button onclick="addStock()">ADD STOCK</button>

<h3>📦 STOCK</h3>
<div id="stock"></div>

<h3>🧾 ORDERS</h3>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,onSnapshot,addDoc,doc,updateDoc,getDocs,query,where,limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA", authDomain:"accountshop-a94e8.firebaseapp.com", projectId:"accountshop-a94e8", appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff" };

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const ADMIN="jhonlouiebaid92@gmail.com";

onAuthStateChanged(auth,user=>{
if(!user||user.email!=ADMIN) return location="index.html";

loadStock();
loadOrders();
});

window.addStock = async () => {

  let file = document.getElementById("img").files[0];
  let username = document.getElementById("user").value;
  let password = document.getElementById("pass").value;
  let product = document.getElementById("product").value;

  if(!file || !username || !password){
    return alert("Fill all + image!");
  }

  let reader = new FileReader();

  reader.onload = function(e){

    let img = new Image();
    img.src = e.target.result;

    img.onload = async function(){

      // 🔥 COMPRESS IMAGE
      let canvas = document.createElement("canvas");
      let ctx = canvas.getContext("2d");

      let scale = 0.5; // bawas size
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      let compressed = canvas.toDataURL("image/jpeg", 0.6);

      try{
        await addDoc(collection(db,"accounts"),{
          product:product,
          username:username,
          password:password,
          image:compressed,
          status:"available"
        });

        alert("✅ Stock Added!");

        user.value="";
        pass.value="";
        img.value="";

      }catch(err){
        alert("Upload error: " + err.message);
      }

    };

  };

  reader.readAsDataURL(file);
};

function loadStock(){
onSnapshot(collection(db,"accounts"),snap=>{
stock.innerHTML="";
snap.forEach(d=>{
let a=d.data();
stock.innerHTML+=`<div class="card">${a.product} | ${a.status}</div>`;
});
});
}

function loadOrders(){
onSnapshot(collection(db,"orders"),snap=>{
orders.innerHTML="";
snap.forEach(d=>{
let o=d.data();

orders.innerHTML+=`
<div class="card">
${o.email}<br>
Status: ${o.status}
${o.status!="approved"
? `<button onclick="approve('${d.id}')">Approve</button>`
: "✅ Done"}
</div>`;
});
});
}

window.approve=async(id)=>{
const q=query(collection(db,"accounts"),
where("status","==","reserved"),
limit(1));

const snap=await getDocs(q);
if(snap.empty) return alert("No reserved");

let acc=snap.docs[0];

await updateDoc(doc(db,"accounts",acc.id),{status:"sold"});

await updateDoc(doc(db,"orders",id),{
status:"approved",
account:`USER:${acc.data().username} PASS:${acc.data().password}`
});

alert("Sent!");
};
</script>

</body>
</html>
