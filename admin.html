<!DOCTYPE html>
<html>
<head>
<title>ADMIN PRO</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;}
.box{background:#1e293b;padding:20px;margin:15px;border-radius:15px;}
input,select,button{width:90%;padding:10px;margin:5px;border:none;border-radius:10px;}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL PRO</h2>

<div class="box">
<h3>Add Stock</h3>

<select id="product">
<option value="CODM">CODM</option>
<option value="ML">ML</option>
<option value="Netflix">Netflix</option>
</select>

<input id="stockUser" placeholder="Username">
<input id="stockPass" placeholder="Password">

<input type="file" id="img">

<button onclick="addStock()">ADD STOCK</button>
</div>

<div class="box">
<h3>📦 STOCK</h3>
<div id="stockList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ STORAGE IMPORT (IMPORTANT)
import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

// 🔐 CHECK ADMIN
onAuthStateChanged(auth,user=>{
if(!user){
location="index.html";
return;
}

loadStock();
});

// 🔥 ADD STOCK FIXED
window.addStock=async()=>{
let user=stockUser.value;
let pass=stockPass.value;
let product=productSelect.value;
let file=document.getElementById("img").files[0];

if(!user||!pass||!file){
alert("Fill all!");
return;
}

try{

// 📤 UPLOAD IMAGE
let storageRef=ref(storage,"products/"+Date.now());
await uploadBytes(storageRef,file);
let url=await getDownloadURL(storageRef);

// 💾 SAVE TO FIRESTORE
await addDoc(collection(db,"accounts"),{
username:user,
password:pass,
product:product,
image:url,
status:"available"
});

alert("✅ Added with image!");

stockUser.value="";
stockPass.value="";
img.value="";

}catch(e){
console.error(e);
alert("Upload error!");
}
};

// 🔥 LOAD STOCK
function loadStock(){
onSnapshot(collection(db,"accounts"),snap=>{
stockList.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

stockList.innerHTML+=`
<div class="box">
<img src="${d.image}" width="100%">
<p>${d.product}</p>
<p>${d.username}</p>
<p>Status: ${d.status}</p>
</div>`;
});
});
}
</script>

</body>
</html>
