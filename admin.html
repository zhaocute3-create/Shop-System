<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#020617;color:white;font-family:sans-serif}
button{
background:#00ff88;
padding:10px;
border:none;
margin:5px;
box-shadow:0 0 10px #00ff88;
border-radius:10px;
}
.card{
border:1px solid #00ff88;
margin:10px;
padding:10px;
}
</style>
</head>

<body>

<h2>🔥 ADMIN PANEL V2</h2>

<h3>💰 Earnings: <span id="earn">0</span></h3>
<h3>📦 Orders: <span id="count">0</span></h3>
<h3>👥 Online Users: <span id="online">0</span></h3>

<canvas id="chart" height="100"></canvas>

<hr>

<input id="product" placeholder="Product"><br>
<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>

<button onclick="addStock()">ADD STOCK</button>

<h3>📦 STOCK</h3>
<div id="stock"></div>

<h3>📥 ORDERS</h3>
<input id="search" placeholder="Search email" oninput="renderOrders()">
<div id="orders"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,addDoc,onSnapshot,
doc,updateDoc,getDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let allOrders=[];
let chart;

// 🔒 SECURITY
onAuthStateChanged(auth,user=>{
 if(!user || user.email!=="jhonlouiebaid92@gmail.com"){
  location="index.html";
 }
});

// 📊 CHART INIT
const ctx = document.getElementById("chart");
chart = new Chart(ctx, {
 type: "line",
 data: {
  labels: [],
  datasets: [{
   label: "Earnings",
   data: [],
  }]
 }
});

// 💰 EARNINGS + GRAPH
onSnapshot(collection(db,"earnings"),snap=>{
 let total=0;
 let data=[];
 let labels=[];

 snap.forEach(d=>{
  total+=d.data().amount;
  data.push(d.data().amount);
  labels.push(new Date().toLocaleTimeString());
 });

 earn.innerText=total;

 chart.data.labels=labels;
 chart.data.datasets[0].data=data;
 chart.update();
});

// 👥 ONLINE USERS
onSnapshot(collection(db,"presence"),snap=>{
 online.innerText=snap.size;
});

// ➕ ADD STOCK
window.addStock=async()=>{
 await addDoc(collection(db,"accounts"),{
  product:product.value,
  username:user.value,
  password:pass.value,
  status:"available"
 });
 alert("Added!");
};

// 📦 STOCK VIEW
onSnapshot(collection(db,"accounts"),snap=>{
 let html="";
 snap.forEach(d=>{
  let s=d.data();
  if(s.status==="available"){
   html+=`<div class="card">${s.product}</div>`;
  }
 });
 stock.innerHTML=html;
});

// 📥 ORDERS
onSnapshot(collection(db,"orders"),snap=>{
 allOrders=[];
 count.innerText=snap.size;

 snap.forEach(d=>{
  allOrders.push({id:d.id,...d.data()});
 });
 renderOrders();
});

// 🔍 SEARCH
window.renderOrders=()=>{
 let html="";
 let q=search.value.toLowerCase();

 allOrders.forEach(o=>{
  if(o.email.toLowerCase().includes(q)){
   html+=`
   <div class="card">
   ${o.email}<br>${o.status}
   <button onclick="approve('${o.id}','${o.accId}')">Approve</button>
   </div>`;
  }
 });
 orders.innerHTML=html;
};

// ✅ APPROVE
window.approve=async(id,accId)=>{
 let acc=await getDoc(doc(db,"accounts",accId));
 let data=acc.data();

 await updateDoc(doc(db,"accounts",accId),{
  status:"sold"
 });

 await updateDoc(doc(db,"orders",id),{
  status:"approved",
  username:data.username,
  password:data.password
 });

 await addDoc(collection(db,"earnings"),{
  amount:100,
  time:Date.now()
 });

 alert("Approved + Sent 🔥");
};
</script>

</body>
</html>
