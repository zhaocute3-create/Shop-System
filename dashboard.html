<!DOCTYPE html>
<html>
<head>
<title>Pro Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

.header {
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#020617;
}

.container { padding:20px; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.order {
  background:#334155;
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="header">🔥 PRO Dashboard</div>

<div class="container">

<div class="card">
  <h3 id="userEmail">Loading...</h3>
</div>

<div class="card">
  <h3>Buy Product</h3>
  <input id="ref" placeholder="GCash Ref">
  <button onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>My Orders (LIVE)</h3>
  <div id="orders"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// USER
onAuthStateChanged(auth, (user) => {
  if (!user) return location.href = "index.html";

  document.getElementById("userEmail").innerText = user.email;

  // 🔥 REAL-TIME LISTENER
  onSnapshot(collection(db, "orders"), (snapshot) => {
    document.getElementById("orders").innerHTML = "";

    snapshot.forEach(doc => {
      let o = doc.data();

      if (o.email === user.email) {
        document.getElementById("orders").innerHTML += `
          <div class="order">
            <p>${o.item} - ₱${o.price}</p>
            <p>Status: ${o.status}</p>
            ${o.status === "approved" ? `<p>✅ ${o.account}</p>` : ""}
          </div>
        `;
      }
    });
  });
});

// BUY
window.buy = async function(){
  let user = auth.currentUser;

  await addDoc(collection(db, "orders"), {
    email: user.email,
    item: "Premium",
    price: 50,
    status: "pending"
  });

  alert("Order sent!");
};
</script>

</body>
</html>
