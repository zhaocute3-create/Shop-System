<!DOCTYPE html>
<html>
<head>
<title>Shop</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;}
#loading{position:fixed;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:#020617;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px;}
.card{background:#1e293b;padding:15px;border-radius:15px;}
button,input{width:100%;padding:10px;margin-top:5px;border:none;border-radius:10px;}
button{background:#22c55e;}
</style>

</head>

<body>

<div id="loading">Loading...</div>
<div id="main" style="display:none;">
<h2 style="text-align:center;">🎮 Shop</h2>
<div class="container" id="shop"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  addDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

await setPersistence(auth, browserLocalPersistence);

let lastBuy=0;

// 🔐 FIX LOOP
onAuthStateChanged(auth,(user)=>{
  if(user===null) return;

  if(!user){
    location.replace("index.html");
    return;
  }

  loading.style.display="none";
  main.style.display="block";

  loadShop(user);
});

function loadShop(user){
  onSnapshot(collection(db,"accounts"),snap=>{
    shop.innerHTML="";

    snap.forEach(docSnap=>{
      let a=docSnap.data();
      let id=docSnap.id;

      shop.innerHTML+=`
      <div class="card">
        <h3>${a.product}</h3>
        <p>Status: ${a.status}</p>

        <input id="ref_${id}" placeholder="GCash Ref">

        ${
          a.status==="available"
          ? `<button onclick="buy('${id}')">Buy</button>`
          : `<button disabled>SOLD</button>`
        }
      </div>`;
    });
  });
}

window.buy=async(id)=>{
  let now=Date.now();
  if(now-lastBuy<10000) return alert("Wait 10s");

  let user=auth.currentUser;
  let ref=document.getElementById("ref_"+id).value;

  if(!ref) return alert("Enter ref");

  await addDoc(collection(db,"orders"),{
    email:user.email,
    accountId:id,
    status:"pending"
  });

  await updateDoc(doc(db,"accounts",id),{
    status:"reserved"
  });

  lastBuy=now;
  alert("Ordered!");
};
</script>

</body>
</html>
