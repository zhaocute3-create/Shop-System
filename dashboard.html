<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>🧾 DASHBOARD</h2>
<a href="shop.html">GO SHOP</a>

<div id="orders"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,query,where,onSnapshot,
doc,setDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ✅ AUTH + ONLINE TRACKER (ONLY ONE)
onAuthStateChanged(auth,async user=>{
 if(!user) return location="index.html";

 let ref=doc(db,"presence",user.uid);

 await setDoc(ref,{
  email:user.email,
  online:true
 });

 window.addEventListener("beforeunload",()=>{
  deleteDoc(ref);
 });

 // ✅ LOAD USER ORDERS
 const q=query(
  collection(db,"orders"),
  where("email","==",user.email)
 );

 onSnapshot(q,snap=>{
  let html="";

  snap.forEach(d=>{
   let o=d.data();

   html+=`
   <div style="border:1px solid #00ffcc;margin:10px;padding:10px">
   ${o.product}<br>
   ${o.status}<br>

   ${o.ref?`Ref: ${o.ref}`:""}
   ${o.receipt?`<img src="${o.receipt}" width="100%">`:""}

   ${o.status==="approved"?`
   <hr>
   USER:${o.username}<br>
   PASS:${o.password}
   `:"Waiting..."}

   </div>`;
  });

  orders.innerHTML=html || "<p>No orders yet</p>";
 });

});
</script>

</body>
</html>
