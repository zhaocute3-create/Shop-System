<!DOCTYPE html>
<html>
<head>
<title>Shop Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* LOADING */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  position:relative;
}

.card img {
  width:100%;
  border-radius:10px;
}

.sold {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">
  <h2>Loading...</h2>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
  <div class="header">🎮 Game Account Shop</div>
  <div class="container" id="shop"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  addDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR REAL CONFIG (wag ... dapat buo)
const firebaseConfig = {
  apiKey: "YOUR_REAL_APIKEY",
  authDomain: "YOUR_REAL_AUTHDOMAIN",
  projectId: "YOUR_REAL_PROJECTID",
  appId: "YOUR_REAL_APPID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 KEEP LOGIN SESSION
await setPersistence(auth, browserLocalPersistence);

// ⏱️ Anti spam
let lastBuy = 0;

// 🔐 FIXED AUTH CHECK (NO LOOP)
onAuthStateChanged(auth, (user) => {

  // ⚠️ WAIT muna wag redirect agad
  if (user === null) return;

  if (!user) {
    window.location.replace("index.html");
    return;
  }

  // ✅ SHOW UI
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";

  loadShop(user);
});

// 🔥 LOAD SHOP
function loadShop(user){

  onSnapshot(collection(db,"accounts"), snap => {

    let html = "";

    snap.forEach(docSnap => {
      let a = docSnap.data();
      let id = docSnap.id;

      html += `
      <div class="card">
        ${a.status === "sold" ? `<div class="sold">SOLD</div>` : ""}

        <img src="${a.image || 'https://via.placeholder.com/300'}">
        <h3>${a.product}</h3>
        <p>Account #${id.slice(0,5)}</p>

        <input id="ref_${id}" placeholder="GCash Ref">

        ${
          a.status === "available"
          ? `<button onclick="buy('${id}')">Buy</button>`
          : `<button disabled>SOLD</button>`
        }
      </div>`;
    });

    document.getElementById("shop").innerHTML = html;
  });
}

// 🛒 BUY
window.buy = async function(id){

  const now = Date.now();

  if(now - lastBuy < 10000){
    alert("Wait 10 seconds!");
    return;
  }

  let user = auth.currentUser;
  let ref = document.getElementById("ref_"+id).value;

  if(!ref) return alert("Enter GCash Ref!");

  // SAVE ORDER
  await addDoc(collection(db,"orders"),{
    email:user.email,
    accountId:id,
    reference: ref,
    status:"pending"
  });

  // 🔒 LOCK ACCOUNT
  await updateDoc(doc(db,"accounts",id),{
    status:"reserved"
  });

  lastBuy = now;

  alert("Order placed!");
};
</script>

</body>
</html>
