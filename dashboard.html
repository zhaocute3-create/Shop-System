<!DOCTYPE html>
<html>
<head>
<title>SHOP</title>

<style>
body{background:#020617;color:white;font-family:Arial;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px;}
.card{background:#1e293b;padding:15px;border-radius:15px;}
img{width:100%;border-radius:10px;}
button,input{
width:100%;padding:10px;margin-top:5px;border:none;border-radius:10px;
}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<h2 style="text-align:center;">🎮 SHOP</h2>
<div class="container" id="shop"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,onSnapshot,addDoc,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN CHECK
onAuthStateChanged(auth,(u)=>{
if(!u){
location="index.html";
}
});

// 🔥 LOAD STOCK REALTIME
onSnapshot(collection(db,"accounts"),snap=>{
shop.innerHTML="";

snap.forEach(docSnap=>{
let a=docSnap.data();
let id=docSnap.id;

if(a.status!=="available") return;

shop.innerHTML+=`
<div class="card">
<img src="${a.image}">
<h3>${a.product}</h3>
<p>${a.username}</p>

<input id="ref_${id}" placeholder="GCash Ref">

<button onclick="buy('${id}')">BUY</button>
</div>
`;
});
});

// 🛒 BUY
window.buy=async(id)=>{
let user=auth.currentUser;
let ref=document.getElementById("ref_"+id).value;

if(!ref){
alert("Enter GCash Ref");
return;
}

await addDoc(collection(db,"orders"),{
email:user.email,
accountId:id,
status:"pending"
});

await updateDoc(doc(db,"accounts",id),{
status:"reserved"
});

alert("✅ Order Sent!");
};
</script>

</body>
</html>
