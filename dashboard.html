<!DOCTYPE html>
<html>
<head>
<title>Shop</title>

<style>
body{background:#020617;color:white;font-family:Arial;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px;}
.card{background:#1e293b;padding:15px;border-radius:15px;}
img{width:100%;border-radius:10px;}
button,input{width:100%;padding:10px;margin-top:5px;border:none;border-radius:10px;}
button{background:#22c55e;}
pre{background:black;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🎮 ZHAO BM SELLER</h2>

<div class="container" id="shop"></div>

<h2 style="text-align:center;">📦 My Orders</h2>
<div class="container" id="myOrders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,onSnapshot,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

// FIX LOOP
onAuthStateChanged(auth,(user)=>{
if(user===null)return;
if(!user) location="index.html";
});

// LOAD PRODUCTS
onSnapshot(collection(db,"accounts"),snap=>{
shop.innerHTML="";

snap.forEach(docSnap=>{
let a=docSnap.data();

shop.innerHTML+=`
<div class="card">
<img src="${a.image}">
<h3>${a.product}</h3>

<input type="file" id="proof_${docSnap.id}">

<button onclick="buy('${docSnap.id}','${a.product}')">BUY</button>
</div>`;
});
});

// BUY WITH GCASH PROOF
window.buy=async(id,product)=>{
let file=document.getElementById("proof_"+id).files[0];
if(!file) return alert("Upload GCash Proof!");

let reader=new FileReader();
reader.onload=async function(){
await addDoc(collection(db,"orders"),{
email:auth.currentUser.email,
product:product,
proof:reader.result,
status:"pending"
});
alert("Order Sent!");
};
reader.readAsDataURL(file);
};

// SHOW MY ORDERS
onSnapshot(collection(db,"orders"),snap=>{
myOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

if(o.email===auth.currentUser.email){

myOrders.innerHTML+=`
<div class="card">
${o.product}<br>
Status: ${o.status}

${
o.status==="approved"
? `<pre>${o.account}</pre>`
: "Waiting..."
}
</div>`;
}
});
});
</script>

</body>
</html>
