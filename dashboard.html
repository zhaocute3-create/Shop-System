<!DOCTYPE html>
<html>
<head>
<title>Pro Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* LOADING */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader {
  border:5px solid #1e293b;
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

.header {
  padding:15px;
  text-align:center;
  background:#020617;
  font-weight:bold;
}

.container { padding:20px; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

button, input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
}

.logout {
  background:red;
}

.order {
  background:#334155;
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Loading your account...</p>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="header">
  🎮 Dashboard
</div>

<div class="container">

<div class="card">
  <h3 id="userEmail"></h3>
</div>

<div class="card">
  <input id="ref" placeholder="GCash Ref">
  <button onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>My Orders (LIVE)</h3>
  <div id="orders"></div>
</div>

<!-- 🔥 LOGOUT BUTTON -->
<div class="card">
  <button class="logout" onclick="logout()">Logout</button>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  onAuthStateChanged, 
  signOut,
  setPersistence, 
  browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 SAVE LOGIN SESSION
await setPersistence(auth, browserLocalPersistence);

// ⏱️ Anti-spam
let lastBuyTime = 0;

// 🔐 AUTH CHECK (FIXED)
onAuthStateChanged(auth, (user) => {

  if (user === null) return;

  if (!user) {
    window.location.replace("index.html");
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";

  document.getElementById("userEmail").innerText = user.email;

  // 🔥 REAL-TIME ORDERS
  onSnapshot(collection(db, "orders"), (snapshot) => {
    document.getElementById("orders").innerHTML = "";

    snapshot.forEach(doc => {
      let o = doc.data();

      if (o.email === user.email) {
        document.getElementById("orders").innerHTML += `
          <div class="order">
            <p>${o.item} - ₱${o.price}</p>
            <p>Status: ${o.status}</p>
            ${o.status === "approved" ? `<p>✅ ${o.account}</p>` : ""}
          </div>
        `;
      }
    });
  });

});

// 🛒 BUY
window.buy = async function(){
  const now = Date.now();

  if(now - lastBuyTime < 10000){
    alert("Wait 10 seconds!");
    return;
  }

  let user = auth.currentUser;
  let ref = document.getElementById("ref").value;

  if(!ref){
    alert("Enter GCash Ref!");
    return;
  }

  await addDoc(collection(db, "orders"), {
    email: user.email,
    item: "Premium",
    price: 50,
    reference: ref,
    status: "pending"
  });

  lastBuyTime = now;

  alert("Order sent!");
};

// 🔥 LOGOUT FUNCTION
window.logout = function(){
  signOut(auth).then(() => {
    window.location.replace("index.html");
  });
};
</script>

</body>
</html>
