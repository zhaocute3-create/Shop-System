<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
<style>
body{background:#020617;color:white;font-family:Arial;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;padding:10px;}
.card{background:#1e293b;padding:10px;border-radius:10px;}
img{width:100%;border-radius:10px;}
button,input{width:100%;margin-top:5px;padding:10px;border:none;border-radius:10px;}
button{background:#22c55e;}
</style>
</head>
<body>

<h2 style="text-align:center;">🎮 Shop</h2>
<div class="container" id="shop"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,collection,onSnapshot,addDoc,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA", authDomain:"accountshop-a94e8.firebaseapp.com", projectId:"accountshop-a94e8", appId:1:396312062190:web:c4ac936bd7f5bc11f0ebff" };

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

onAuthStateChanged(auth,user=>{
if(!user) return location="index.html";

onSnapshot(collection(db,"accounts"),snap=>{
shop.innerHTML="";
snap.forEach(d=>{
let a=d.data();
if(a.status!="available") return;

shop.innerHTML+=`
<div class="card">
<img src="${a.image}">
<h3>${a.product}</h3>
<input id="ref_${d.id}" placeholder="GCash Ref">
<button onclick="buy('${d.id}')">Buy</button>
</div>`;
});
});
});

window.buy=async(id)=>{
let ref=document.getElementById("ref_"+id).value;
if(!ref) return alert("Enter ref");

let user=auth.currentUser;

await addDoc(collection(db,"orders"),{
email:user.email,
accountId:id,
status:"pending"
});

await updateDoc(doc(db,"accounts",id),{status:"reserved"});

alert("Order placed!");
};
</script>
</body>
</html>
