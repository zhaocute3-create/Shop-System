<!DOCTYPE html>
<html>
<head>
<style>
body{background:#020617;color:white}
.card{border:1px solid #00ff88;padding:10px;margin:10px}
button{background:#00ff88;border:none;padding:10px}
</style>
</head>
<body>

<h2>🛒 SHOP</h2>
<div id="stock"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,onSnapshot,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

onSnapshot(collection(db,"accounts"),snap=>{
 let html="";
 snap.forEach(docu=>{
  let s=docu.data();

  if(s.status==="available"){
   html+=`
   <div class="card">
   ${s.product}<br>
   ${s.username}<br>
   <img src="${s.image}" width="100%">
   <button onclick="buy('${docu.id}')">BUY</button>
   </div>`;
  }
 });
 stock.innerHTML=html;
});

window.buy=async(id)=>{
 let user=auth.currentUser;

 await addDoc(collection(db,"orders"),{
  email:user.email,
  accId:id,
  status:"pending"
 });

 alert("📥 Order Sent");
};
</script>

</body>
</html>
