<!DOCTYPE html>
<html>
<head>
<style>
body{background:#020617;color:white}
.card{border:1px solid #00ff88;padding:10px;margin:10px}
button{background:#00ff88;border:none;padding:10px}
</style>
</head>
<body>

<h2>🛒 SHOP</h2>
<div id="stock"></div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  collection, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.buy = async (id, product) => {
  if (!auth.currentUser) return alert("Login muna");

  await addDoc(collection(db, "orders"), {
    user: auth.currentUser.email,
    accountId: id,
    product: product,
    status: "pending",
    created: Date.now()
  });

  alert("Order sent 🔥");
};
</script>

</body>
</html>
