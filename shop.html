<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
<style>
body {background:#0f172a; color:white; font-family:Arial;}
.card {background:#1e293b; padding:15px; margin:10px; border-radius:10px;}
button {background:#22c55e; padding:10px; border:none; border-radius:10px;}

<body>

<h2>🎮 Account Shop</h2>

<div class="card">
<h3>ML Account</h3>
<p>₱1500</p>
<button onclick="buy('ML Account',1500)">Buy</button>
</div>

<div class="card">
<h3>CODM Account</h3>
<p>₱2000</p>
<button onclick="buy('CODM Account',2000)">Buy</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.buy = async (item, price) => {
  let user = auth.currentUser;

  if(!user){
    alert("Login first!");
    return;
  }

  await addDoc(collection(db, "orders"), {
    uid: user.uid,
    email: user.email,
    item: item,
    price: price,
    status: "pending",
    date: new Date()
  });

  alert("Order placed!");
}
</script>

</body>
