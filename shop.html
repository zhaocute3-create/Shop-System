<!DOCTYPE html>
<html>
<head>
<style>
body{background:#020617;color:white;font-family:sans-serif}
.card{border:1px solid #00ff88;margin:10px;padding:10px}
button{background:#00ff88;border:none;padding:10px}
</style>
</head>

<body>

<h2>🛒 SHOP</h2>
<div id="stock"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
collection,onSnapshot,addDoc,
doc,setDoc,deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ONLINE USERS
onAuthStateChanged(auth, async user=>{
 if(!user) return location="index.html";

 let ref=doc(db,"presence",user.uid);

 await setDoc(ref,{email:user.email});

 window.addEventListener("beforeunload",()=>{
  deleteDoc(ref);
 });
});

// LOAD STOCK
onSnapshot(collection(db,"accounts"),snap=>{
 let html="";
 snap.forEach(d=>{
  let s=d.data();

  if(s.status==="available"){
   html+=`
   <div class="card">
   ${s.product}<br>
   💰 ₱${s.price}<br>

   ${s.image1?`<img src="${s.image1}" width="100%">`:""}
   ${s.image2?`<img src="${s.image2}" width="100%">`:""}
   ${s.image3?`<img src="${s.image3}" width="100%">`:""}

   <button onclick="buy('${d.id}','${s.product}')">BUY</button>
   </div>`;
  }
 });

 stock.innerHTML=html;
});

// BUY
window.buy=async(id,product)=>{
 let user=auth.currentUser;

 let ref=prompt("Enter GCash Ref:");
 if(!ref)return;

 let input=document.createElement("input");
 input.type="file";

 input.onchange=()=>{
  let file=input.files[0];

  let reader=new FileReader();
  reader.onload=async(e)=>{

   await addDoc(collection(db,"orders"),{
    email:user.email,
    accId:id,
    product:product,
    ref:ref,
    receipt:e.target.result,
    status:"pending"
   });

   alert("Order sent ✅");
  };

  reader.readAsDataURL(file);
 };

 input.click();
};
</script>

</body>
</html>
