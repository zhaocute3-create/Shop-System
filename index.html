<!DOCTYPE html>
<html>
<head>
<title>Shop-System</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box {
  background:#1e293b;
  padding:25px;
  margin:80px auto;
  width:300px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input, button {
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

input {
  background:#0f172a;
  color:white;
}

button {
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
  <h2>Login / Register</h2>

  <input id="email" type="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 ADMIN EMAIL
const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// REGISTER
window.register = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("pass").value;

  if (!email || !password) {
    alert("Fill all fields!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Registered Successfully!");
    })
    .catch((error) => {
      alert(error.message);
    });
};

// LOGIN (ADMIN + USER SYSTEM)
window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("pass").value;

  if (!email || !password) {
    alert("Fill all fields!");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {

      if (email === ADMIN_EMAIL) {
        alert("Welcome Admin 🔥");
        window.location.href = "admin.html";
      } else {
        alert("Welcome User 👤");
        window.location.href = "dashboard.html";
      }

    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
