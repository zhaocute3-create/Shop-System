<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:#0f172a;color:white;text-align:center}
input,button{margin:5px;padding:10px;border-radius:10px;border:none}
button{background:#00ff88;box-shadow:0 0 10px #00ff88}
a{color:#00ffcc;text-decoration:none}
</style>
</head>
<body>

<h2>LOGIN</h2>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">LOGIN</button>

<!-- 🔥 REGISTER LINK -->
<p>
No account?
<a href="register.html">Register</a>
</p>

<script type="module">
import { auth } from "./firebase.js";
import {
 signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN = "jhonlouiebaid92@gmail.com";

window.login=()=>{
 signInWithEmailAndPassword(auth,email.value,pass.value)
 .then(res=>{
  if(res.user.email===ADMIN){
    location="admin.html";
  }else{
    location="dashboard.html";
  }
 })
 .catch(err=>{
  alert(err.message);
 });
}
</script>

</body>
</html>
