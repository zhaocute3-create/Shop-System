<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { background:#0f172a; color:white; text-align:center; font-family:Arial;}
.box {background:#1e293b; padding:20px; margin:50px auto; width:300px; border-radius:15px;}
input,button {width:90%; padding:10px; margin:5px; border-radius:10px; border:none;}
button {background:#22c55e;}
</style>
</head>

<body>

<div class="box">
<h2>Login / Register</h2>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// REGISTER
window.register = function() {
  const email = document.querySelector("input[type='email']").value;
  const password = document.querySelector("input[type='password']").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Registered Successfully!");
    })
    .catch((error) => {
      alert(error.message);
    });
};

// LOGIN
window.login = function() {
  const email = document.querySelector("input[type='email']").value;
  const password = document.querySelector("input[type='password']").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login Success!");
      window.location.href = "admin.html"; // redirect
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
