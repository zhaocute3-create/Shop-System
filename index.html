<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {background:#0f172a;color:white;text-align:center;font-family:Arial;}
.box {background:#1e293b;padding:25px;margin:80px auto;width:300px;border-radius:15px;}
input,button{width:90%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<div class="box">
<h2>Login / Register</h2>

<input id="email" type="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN_EMAIL = "jhonlouiebaid92@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
  authDomain: "accountshop-a94e8.firebaseapp.com",
  projectId: "accountshop-a94e8",
  appId: "1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 KEEP LOGIN
await setPersistence(auth, browserLocalPersistence);

window.register = async () => {
  let email = emailInput.value;
  let pass = passInput.value;

  try {
    await createUserWithEmailAndPassword(auth,email,pass);
    alert("Registered!");
  } catch(e){ alert(e.message); }
};

window.login = async () => {
  let email = emailInput.value;
  let pass = passInput.value;

  try {
    await signInWithEmailAndPassword(auth,email,pass);

    if(email === ADMIN_EMAIL){
      location.href="admin.html";
    }else{
      location.href="dashboard.html";
    }

  } catch(e){ alert(e.message); }
};

const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");
</script>

</body>
</html>
