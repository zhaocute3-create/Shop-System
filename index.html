<!DOCTYPE html>
<html>
<head>
<title>Zhao BM Seller</title>
<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
.box{background:#1e293b;padding:25px;margin:80px auto;width:300px;border-radius:15px;}
input,button{width:90%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:#22c55e;color:white;}
</style>
</head>

<body>

<div class="box">
<h2>Zhao BM Seller</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,createUserWithEmailAndPassword,
signInWithEmailAndPassword,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN="jhonlouiebaid92@gmail.com";

const firebaseConfig={
apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA",
authDomain:"accountshop-a94e8.firebaseapp.com",
projectId:"accountshop-a94e8",
appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

// AUTO LOGIN FIX (NO LOOP)
onAuthStateChanged(auth,user=>{
if(user){
if(user.email===ADMIN){
location="admin.html";
}else{
location="dashboard.html";
}
}
});

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,pass.value);
alert("Registered!");
};

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,pass.value);
};
</script>

</body>
</html>
