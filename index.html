<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input,button{width:80%;padding:10px;margin:5px;border:none;border-radius:10px;}
button{background:#22c55e;}
</style>
</head>
<body>

<h2>🔐 Login / Register</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = { apiKey:"AIzaSyDoG3cCVagED6RcQyy_noijvVibaf1AKwA", authDomain:"accountshop-a94e8.firebaseapp.com", projectId:"accountshop-a94e8", appId:"1:396312062190:web:c4ac936bd7f5bc11f0ebff" };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login=()=>{
signInWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>location="shop.html")
.catch(e=>alert(e.message));
};

window.register=()=>{
createUserWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Registered!"))
.catch(e=>alert(e.message));
};
</script>

</body>
</html>
